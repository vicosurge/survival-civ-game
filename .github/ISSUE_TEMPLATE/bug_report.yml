name: Bug report
description: Something's broken or behaving wrong in the game.
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: The build you were playing (topbar shows it, e.g. v0.4.4).
      placeholder: v0.4.4
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you see vs. what did you expect?
      placeholder: |
        I had 0 scouts, but the ruins event still fired.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce (if you can)
      placeholder: |
        1. Start a new game with origin X
        2. Play to year N with no scouts assigned
        3. Eventually the ruins event triggers
    validations:
      required: false
  - type: input
    id: turn
    attributes:
      label: Turn / Year reached
      placeholder: Year 40
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Chronicle excerpts, a screenshot, the save string from localStorage, whatever helps.
    validations:
      required: false
