name = "cambrera-feedback"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Setup steps (run once before deploying):
#   wrangler d1 create cambrera-feedback
#   → paste the returned database_id below
#   wrangler d1 execute cambrera-feedback --file=schema.sql --remote
#   wrangler secret put DASHBOARD_KEY
#   wrangler deploy

[[d1_databases]]
binding = "DB"
database_name = "cambrera-feedback"
database_id = "REPLACE_WITH_ID_FROM_WRANGLER_D1_CREATE"

[[routes]]
pattern = "cambrera.digimente.xyz/feedback*"
zone_name = "digimente.xyz"
